version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: samm_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-multiple-dbs.sql:/docker-entrypoint-initdb.d/01-init-dbs.sql
    restart: always

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always

  identity-service:
    build: ./backend/identity-service
    ports:
      - "8000:8000"
    env_file: ./backend/identity-service/.env
    environment:
      - DATABASE_URL=postgresql://postgres:1234@postgres:5432/samm_db
    depends_on:
      - postgres

  medication-service:
    build: ./backend/medication-service
    ports:
      - "8001:8001"
    env_file: ./backend/medication-service/.env
    environment:
      - DATABASE_URL=postgresql://postgres:1234@postgres:5432/samm_medicamentos_db
    depends_on:
      - postgres

  notification-service:
    build: ./backend/notification-service
    ports:
      - "8002:8002"
    env_file: ./backend/notification-service/.env
    environment:
      - DATABASE_URL=postgresql://postgres:1234@postgres:5432/samm_notificaciones_db
    depends_on:
      - postgres

  appointments-service:
    build: ./backend/appointments-service
    ports:
      - "8004:8004"
    env_file: ./backend/appointments-service/.env
    environment:
      - DATABASE_URL=postgresql://postgres:1234@postgres:5432/samm_citas_db
    depends_on:
      - postgres

  tracking-service:
    build: ./backend/tracking-service
    ports:
      - "8006:8006"
    env_file: ./backend/tracking-service/.env
    environment:
      - DATABASE_URL=postgresql://postgres:1234@postgres:5432/samm_tracking_db
      - TRACKING_SERVICE_URL=http://tracking-service:8006
    depends_on:
      - postgres
      - redis

volumes:
  postgres_data:
  redis_data: