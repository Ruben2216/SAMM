version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: samm_db
      POSTGRES_USER: SAMM
      POSTGRES_PASSWORD: samm
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  rabbitmq:
    image: rabbitmq:3-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: samm
      RABBITMQ_DEFAULT_PASS: samm_password
    ports:
      - "5672:5672"  
      - "15672:15672"  
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  identity-service:
    build: ./backend/identity-service
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://SAMM:samm@postgres:5432/samm_db
      - GOOGLE_WEB_CLIENT_ID=238255168182-2k6sgdo7moek39stcpdm4jo4otbpmovl.apps.googleusercontent.com
      - JWT_SECRET_KEY=samm-secret-key-cambiar-en-produccion
      - JWT_EXPIRATION_HOURS=24
    depends_on:
      - postgres

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
